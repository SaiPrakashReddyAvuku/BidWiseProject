spring.application.name=bidwise-backend

# Use environment variables for secrets and local overrides.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bidwise}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

security.jwt.secret=${JWT_SECRET:bXlfc3VwZXJfc2VjdXJlX2JpZHdpc2VfanR3X2tleV8xMjM0NTY3ODkw}
security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}

management.endpoints.web.exposure.include=health,info

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
